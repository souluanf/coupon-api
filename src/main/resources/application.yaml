server:
  shutdown: graceful

spring:
  application:
    name: coupon-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  web:
    resources:
      add-mappings: false
  jpa:
    open-in-view: false
  flyway:
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    encoding:
      force: true
  threads:
    virtual:
      enabled: true

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  pattern:
    console: "%red(%d{yyyy-MM-dd'T'HH:mm:ssXXX}) %magenta([%thread]) [${spring.application.name}] %highlight(%-5level) %logger{36} - %msg%n"
  level:
    org.springdoc.core.events.SpringDocAppInitializer: ERROR
